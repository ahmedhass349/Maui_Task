<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Welcome - Task Flow</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #185FA5; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; background: #f9f9f9; }
        .button { display: inline-block; background: #185FA5; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px; }
        .footer { text-align: center; padding: 20px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Welcome to Task Flow</h1>
        </div>
        <div class="content">
            <p>Hello {{FirstName}},</p>
            <p>Welcome to Task Flow. Your account is ready and you can start organizing your work.</p>
            <a href="{{AppUrl}}" class="button">Open Task Flow</a>
        </div>
        <div class="footer">
            <p>This is an automated message from Task Flow.</p>
        </div>
    </div>
</body>
</html>
